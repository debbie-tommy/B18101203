<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdventureOS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="boot-screen">

    <div class="terminal">

        <div class="terminal-header">

            <div class="buttons">
                <span class="red"></span>
                <span class="yellow"></span>
                <span class="green"></span>
            </div>

            <div class="title">
                AdventureOS // Date_01.save
            </div>

        </div>

        <div id="terminal-output"></div>

        <div id="terminal-input">

            <span class="prompt">$</span>

            <input
                id="commandInput"
                autocomplete="off"
                spellcheck="false"
                autofocus>

        </div>

    </div>

</div>


<div class="spotify-widget">

  <div class="spotify-top">
    <svg class="spotify-logo" viewBox="0 0 24 24" width="20" height="20" fill="#1ed760">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141 4.32-1.32 9.719-.66 13.439 1.62.361.181.54.78.302 1.201zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    <button class="chevron" aria-label="minimize">⌄</button>
  </div>

  <div class="now-playing">

    <div class="album-art" id="albumArt">
        <span>🕺</span>
    </div>

    <div class="track-meta">
      <p class="playing-label">PLAYING</p>
      <p id="trackTitle">Blow Your Mind</p>
      <p id="trackArtist">Jamiroquai</p>
    </div>

    <button class="like-btn" id="likeBtn" aria-label="like">♥</button>

  </div>

  <audio id="audioPlayer"></audio>

  <div class="progress-row">
    <span id="curTime">0:00</span>
    <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
    <span id="durTime">0:00</span>
  </div>

  <div class="controls">
    <button id="shuffleBtn" class="ctrl-btn" title="shuffle">🔀</button>
    <button onclick="prevTrack()" class="ctrl-btn" title="previous">⏮</button>
    <button onclick="togglePlay()" id="playBtn" class="play-btn" title="play/pause">▶</button>
    <button onclick="nextTrack()" class="ctrl-btn" title="next">⏭</button>
    <button id="repeatBtn" class="ctrl-btn" title="repeat">🔁</button>
  </div>

  <div class="visualizer" id="visualizer"></div>

  <div class="songs">
    <button onclick="playTrack(0)" class="song-btn" data-index="0">Blow Your Mind</button>
    <button onclick="playTrack(1)" class="song-btn" data-index="1">West Coast Love</button>
  </div>

</div>

<div class="crossword-widget" id="crosswordWidget">

  <div class="crossword-header">
    <span>MINI CROSSWORD</span>
    <button class="like-btn small" id="crosswordLike" aria-label="like">♥</button>
  </div>

  <div class="crossword-body">

    <div class="crossword-grid" id="crosswordGrid"></div>

    <div class="crossword-clues">

      <div class="clue-group">
        <h4>ACROSS</h4>
        <ol id="acrossClues"></ol>
      </div>

      <div class="clue-group">
        <h4>DOWN</h4>
        <ol id="downClues"></ol>
      </div>

    </div>

  </div>

  <button id="checkAnswersBtn">check answers ✨</button>

  <p id="crosswordResult"></p>

</div>

<div class="dock">
    <button class="dock-btn" id="dockFolder" title="save file">📁</button>
    <button class="dock-btn" id="dockHeart" title="secret">♥</button>
    <button class="dock-btn" id="dockTerminal" title="focus terminal">⌨</button>
    <button class="dock-btn" id="dockSparkle" title="surprise">✨</button>
</div>

<script src="script.js"></script>
</body>
</html>
