<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdventureOS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="boot-screen">

    <div class="terminal">

        <div class="terminal-header">

            <div class="buttons">
                <span class="red"></span>
                <span class="yellow"></span>
                <span class="green"></span>
            </div>

            <div class="title">
                AdventureOS // Date_01.save
            </div>

        </div>

        <div id="terminal-output"></div>

        <div id="terminal-input">

            <span class="prompt">$</span>

            <input
                id="commandInput"
                autocomplete="off"
                spellcheck="false"
                autofocus>

        </div>

    </div>

</div>


<div class="spotify-widget">

  <div class="track-info">
    <p id="trackTitle">Select a song</p>
  </div>

  <audio id="audioPlayer"></audio>

  <div class="controls">
    <button onclick="prevTrack()">⏮</button>
    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="nextTrack()">⏭</button>
  </div>

  <div class="songs">
    <button onclick="playTrack(0)">Blow Your Mind</button>
    <button onclick="playTrack(1)">West Coast Love</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
